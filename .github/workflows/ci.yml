name: FintechAnti CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test-python:
    name: Backend CI (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - anomaly_service
          - auth_service
          - analytics_service
          - classification_service
          - retraining_service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest ruff

      - name: Lint with Ruff
        run: |
          cd ${{ matrix.service }}
          ruff check .

      - name: Test with pytest
        env:
          PYTHONPATH: .
        # Using `|| true` so that missing tests or failures won't instantly block early adoption, 
        # but in a strict CI you would remove `|| true`
        run: |
          cd ${{ matrix.service }}
          pytest || echo "Tests failed or no tests found, but proceeding for now"

  lint-and-test-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci || npm install

      - name: Lint Frontend
        run: |
          cd frontend
          npm run lint --if-present

      - name: Test Frontend
        run: |
          cd frontend
          # Vites default template doesn't always have a test script
          npm test --if-present

  build-docker-images:
    name: Docker Build Check (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [lint-and-test-python, lint-and-test-frontend]
    strategy:
      fail-fast: false
      matrix:
        service:
          - anomaly_service
          - auth_service
          - analytics_service
          - classification_service
          - retraining_service
          - frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          cd ${{ matrix.service }}
          docker build -t fintechanti-${{ matrix.service }}:test .
